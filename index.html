<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B9D">
<title>다마고치 공주</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/Galmuri11.css" rel="stylesheet">
<style>
:root{
  --bg:#FFE4EC; --lcd:#FFD0DE; --px:#D97BA5; --dk:#5A1F3A;
  --frame:#F8A5C2; --frame-d:#B8537A; --hi:#FFF5FA; --gold:#E8C28A;
  /* Legacy aliases so existing inline styles keep working */
  --c:#D97BA5; --c2:#D97BA5; --c3:#F8A5C2; --c4:#B8537A; --c5:#E8C28A;
  --cl:#FFD0DE; --cd:#5A1F3A; --sf:#FFD0DE; --sf2:#FFC0D2;
  --tx:#5A1F3A; --tm:#8B3560; --th:#B8537A; --bd:rgba(90,31,58,.18);
  --r:0px; --r2:0px; --glow:3px 3px 0 var(--dk)
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#2A1520; --lcd:#3A1E2E; --px:#E896B8; --dk:#FFE4EC;
    --frame:#5A2C3E; --frame-d:#3A1A28; --hi:#4A2434; --gold:#E8C28A;
    --c:#E896B8; --c3:#8B5070; --c4:#B8648A; --cl:#3A1E2E;
    --sf:#3A1E2E; --sf2:#4A2434; --tx:#FFE4EC; --tm:#F0B0CC; --th:#D08AA8;
    --bd:rgba(255,228,236,.18)
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Galmuri11','DotGothic16','Courier New',monospace;
  color:var(--tx);
  background:
    radial-gradient(circle at 30% 20%,rgba(255,255,255,.25) 0%,transparent 40%),
    linear-gradient(160deg, var(--frame) 0%, var(--frame-d) 100%);
  min-height:100vh;
  letter-spacing:0;
  image-rendering:pixelated;
}
/* Hide scrollbars */
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}

/* Device frame header / footer decoration */
.device-header{
  max-width:480px;margin:12px auto 0;padding:10px 16px;
  display:flex;justify-content:center;align-items:center;gap:10px;
  color:var(--dk);font-size:14px;font-weight:700;letter-spacing:2px;
  text-shadow:1px 1px 0 var(--hi);
}
.device-header::before,.device-header::after{content:'';width:40px;height:6px;background:var(--frame-d);box-shadow:inset 0 2px 0 rgba(0,0,0,.2)}
.device-buttons{
  max-width:480px;margin:10px auto 0;padding:0 16px;
  display:flex;justify-content:center;align-items:center;gap:14px;
}
.device-btn{
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, var(--hi), var(--frame) 60%, var(--frame-d) 100%);
  box-shadow:0 3px 0 var(--frame-d), inset 0 -2px 3px rgba(0,0,0,.15);
  border:2px solid var(--frame-d);
}
.device-btn.gold{background:radial-gradient(circle at 30% 30%, #FFF0D0, var(--gold) 60%, #B58940 100%);border-color:#7A5A28}

/* LCD screen (wraps #app) */
.lcd-wrap{
  max-width:480px;margin:8px auto 0;padding:10px;
  background:linear-gradient(180deg, var(--frame) 0%, var(--frame-d) 100%);
  border-radius:24px;
  box-shadow: 0 6px 0 var(--frame-d), inset 0 2px 0 rgba(255,255,255,.4);
}
.lcd-screen{
  background:var(--lcd);
  border-radius:20px;
  border:6px solid var(--frame-d);
  box-shadow: inset 0 4px 12px rgba(90,31,58,.25), inset 0 -2px 4px rgba(255,255,255,.3);
  background-image:
    linear-gradient(rgba(90,31,58,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,31,58,.04) 1px, transparent 1px);
  background-size: 4px 4px;
}
#app{max-width:480px;margin:0 auto;padding:14px 14px 100px;position:relative;z-index:2}

/* Status bar */
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;margin:8px 0 10px;
  background:var(--hi);
  border:3px solid var(--dk);
  box-shadow:3px 3px 0 var(--dk);
  font-size:12px;font-weight:700;color:var(--dk);
}
.status-bar .hearts{letter-spacing:2px}
.status-bar .heart{color:var(--gold);text-shadow:1px 1px 0 var(--dk)}
.status-bar .heart.empty{color:var(--frame);opacity:.55}
.status-bar .stat{display:flex;align-items:center;gap:4px}

/* Princess stage — Tamagotchi LCD dome shape */
.princess-stage{
  margin:4px 0 12px;padding:22px 14px 16px;
  background:var(--hi);
  border:3px solid var(--dk);
  box-shadow:4px 4px 0 var(--dk);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background-image:
    linear-gradient(rgba(90,31,58,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,31,58,.05) 1px, transparent 1px);
  background-size:4px 4px;
  position:relative;
  /* dome top, flat bottom — like a tamagotchi LCD */
  border-radius:50% 50% 10px 10px / 32% 32% 10px 10px;
  overflow:hidden;
}
.princess-stage::after{
  /* subtle LCD shine on the top curve */
  content:'';position:absolute;top:6px;left:10%;right:10%;height:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0));
  border-radius:50%/100% 100% 0 0;
  pointer-events:none;
}
.princess-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.princess{
  width:192px;height:192px;image-rendering:pixelated;
  animation:idle 2.4s ease-in-out infinite, blink 4s infinite;
  transform-origin:center bottom;
}
.princess.jump{animation:princessJump .6s ease-in-out 3, blink 3s infinite}
@keyframes blink{
  0%,46%,50%,96%,100%{filter:none}
  48%{filter:brightness(.5) saturate(.6)}
}
@keyframes idle{
  0%,100%{transform:translateY(0) scaleY(1)}
  50%{transform:translateY(-2px) scaleY(1.02)}
}
@keyframes princessJump{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
}
.princess-label{font-size:11px;color:var(--dk);font-weight:700;letter-spacing:1px}
.princess-squat{animation:squat 1.4s ease-in-out infinite, blink 3s infinite}
@keyframes squat{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(6px) scaleY(.88)}}
.princess-prop{position:absolute;image-rendering:pixelated;pointer-events:none}
.prop-dumbbell{right:6px;bottom:58px;width:44px;height:44px;animation:bob 1.4s ease-in-out infinite}
.prop-book{right:2px;bottom:52px;width:48px;height:48px;animation:float 2.2s ease-in-out infinite}
.prop-mirror{right:2px;bottom:66px;width:46px;height:54px;animation:float 2.2s ease-in-out infinite}
.prop-wand{right:-2px;bottom:66px;width:52px;height:66px;animation:wandSwing 2s ease-in-out infinite;transform-origin:50% 90%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes wandSwing{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.sparkle{position:absolute;color:#F4D06F;font-size:14px;text-shadow:1px 1px 0 #B8860B;animation:sparkle 1.4s ease-in-out infinite}
.sparkle.s1{top:12px;right:42px;animation-delay:0s}
.sparkle.s2{top:32px;right:14px;animation-delay:.4s}
.sparkle.s3{top:58px;right:0px;animation-delay:.8s}
@keyframes sparkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
/* Strength-day lift animation: 2 frames, 1 sec each */
.princess-lift-stack{position:relative;width:192px;height:192px;margin:0 auto}
.princess-lift-stack .lift-frame{
  position:absolute;top:0;left:0;width:192px;height:192px;
  image-rendering:pixelated;
  animation:liftSwap 2s steps(1) infinite, blink 4s infinite;
}
.princess-lift-stack .lift-frame.f2{animation-delay:-1s, 0s}
@keyframes liftSwap{0%,49.99%{opacity:1}50%,100%{opacity:0}}
/* Cardio-day run animation: 2 frames, 0.25s each (fast like running) */
.princess-run-stack{position:relative;width:192px;height:192px;margin:0 auto}
.princess-run-stack .run-frame{
  position:absolute;top:0;left:0;width:192px;height:192px;
  image-rendering:pixelated;
  animation:runSwap .5s steps(1) infinite, blink 4s infinite;
}
.princess-run-stack .run-frame.f2{animation-delay:-.25s, 0s}
@keyframes runSwap{0%,49.99%{opacity:1}50%,100%{opacity:0}}

/* Pixel buttons */
.btn-primary,.btn-ghost,.btn-skip,.safe-cta,.complete-btn,.weight-row button,.wt-input-row button{
  font-family:inherit;
  border:3px solid var(--dk) !important;
  border-radius:0 !important;
  box-shadow:3px 3px 0 var(--dk) !important;
  text-transform:uppercase;letter-spacing:1px;
  font-weight:700;
  transition:transform .05s, box-shadow .05s;
  cursor:pointer;
}
.btn-primary,.safe-cta,.complete-btn,.weight-row button,.wt-input-row button{
  background:var(--px) !important;color:var(--hi) !important;
  padding:10px 14px;
  font-size:14px;
  text-shadow:1px 1px 0 var(--dk);
}
.btn-primary::before,.safe-cta::before,.complete-btn::before{content:'♥ ';}
.btn-ghost{
  background:var(--lcd) !important;color:var(--dk) !important;
  padding:10px 14px;font-size:13px;
}
.btn-skip{
  background:var(--hi) !important;color:var(--dk) !important;
  padding:8px 12px;font-size:12px;
  border-style:dashed !important;
}
.btn-primary:active,.btn-ghost:active,.btn-skip:active,.safe-cta:active,.complete-btn:active,
.weight-row button:active,.wt-input-row button:active{
  transform:translate(3px,3px) !important;
  box-shadow:0 0 0 var(--dk) !important;
}

/* Pixel inputs */
input[type="number"],input[type="text"]{
  border:3px solid var(--dk) !important;border-radius:0 !important;
  background:var(--hi) !important;color:var(--dk) !important;
  font-family:'Galmuri11','DotGothic16',monospace !important;
  padding:8px !important;
  box-shadow:2px 2px 0 var(--dk);
}
input:focus{outline:none;box-shadow:2px 2px 0 var(--px) !important}

@keyframes floaty{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(5deg)}}
@keyframes twinkle{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes jelly{0%,100%{transform:scale(1)}25%{transform:scale(.95,1.05)}50%{transform:scale(1.05,.95)}75%{transform:scale(.98,1.02)}}

/* --- Tab bar (pixel) --- */
.tabs{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  display:flex;justify-content:center;
  padding:6px 10px env(safe-area-inset-bottom);
  background:linear-gradient(180deg, transparent, var(--frame-d));
  z-index:99;
}
.tabs-inner{
  display:flex;width:100%;
  background:var(--lcd);
  border:3px solid var(--dk);
  box-shadow:3px 3px 0 var(--dk);
}
.tab{
  flex:1;padding:8px 0 6px;text-align:center;font-size:10px;color:var(--dk);
  border:none;border-right:2px dashed var(--frame-d);
  background:transparent;cursor:pointer;font-family:inherit;
  letter-spacing:0;font-weight:700;
  transition:background .1s;
}
.tab:last-child{border-right:none}
.tab-icon{font-size:20px;display:inline-block;line-height:1;margin-bottom:2px;
  width:28px;height:28px;
  background:var(--hi);
  border:2px solid var(--dk);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 2px;
}
.tab.active{background:var(--px);color:var(--hi);text-shadow:1px 1px 0 var(--dk);border-bottom:4px solid var(--gold)}
.tab.active .tab-icon{background:var(--gold)}

.header{padding:10px 0 6px;text-align:center;position:relative}
.header h1{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--dk);text-shadow:1px 1px 0 var(--hi)}
.routine-label{font-size:13px;font-weight:700;margin:4px 0 2px;color:var(--dk)}
.routine-sub{font-size:11px;color:var(--tm)}

.cycle-bar{display:flex;gap:4px;margin:10px 0;padding:6px;background:var(--hi);border:3px solid var(--dk);box-shadow:3px 3px 0 var(--dk)}
.cycle-step{flex:1;text-align:center;padding:5px 3px;font-size:10px;color:var(--tm);line-height:1.3;min-width:0;border:2px solid transparent;font-weight:700}
.cycle-step.now{background:var(--px);color:var(--hi);border:2px solid var(--dk);text-shadow:1px 1px 0 var(--dk)}
.cycle-step.done-step{color:var(--dk);background:var(--lcd);border:2px solid var(--frame-d)}
.cycle-step .step-icon{font-size:14px;display:block;margin-bottom:2px}

.weight-row{display:flex;align-items:center;gap:8px;background:var(--hi);border:3px solid var(--dk);padding:8px 10px;margin:8px 0;box-shadow:3px 3px 0 var(--dk)}
.weight-row .wv{font-size:16px;font-weight:700;flex:1;color:var(--dk);font-family:'DotGothic16','Galmuri11',monospace}
.weight-row .wv span{font-size:11px;color:var(--tm);font-weight:400}
.weight-row input{width:72px;font-size:13px;text-align:center}
.weight-row button{padding:6px 12px !important;font-size:12px !important}

/* ========== Pixel Safe Card ========== */
.safe-card{margin:12px 0;position:relative;background:var(--hi);border:3px solid var(--dk);box-shadow:4px 4px 0 var(--dk)}
@media(prefers-color-scheme:dark){.safe-card{background:var(--sf)}}
.safe-card.stage-preapproved,.safe-card.stage-approved{background:var(--lcd)}
.safe-card::before,.safe-card::after{content:'';position:absolute;width:4px;height:4px;background:var(--dk)}
.safe-card::before{top:-1px;left:-1px;box-shadow:calc(100% + 2px) 0 0 var(--dk)}
.safe-card::after{bottom:-1px;left:-1px;box-shadow:calc(100% + 2px) 0 0 var(--dk)}
.safe-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px}
.safe-header-title{font-size:14px;font-weight:700;letter-spacing:1px;color:var(--dk);flex:1;text-align:center}
.safe-header-edit{font-size:12px;color:var(--tm);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;flex-shrink:0}
.safe-body{padding:0 16px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* ---- Vault Assembly (PNG frame, transparent heart) ---- */
.safe-assembly{position:relative;width:360px;max-width:100%;aspect-ratio:500/272;margin:0 auto;overflow:visible}
/* Reward image BEHIND frame — positioned exactly at heart hole */
.safe-img-layer{position:absolute;top:33.7%;left:45.4%;width:21.1%;height:31.6%;z-index:0;pointer-events:none;overflow:hidden;image-rendering:pixelated}
.safe-img-layer img{width:100%;height:100%;object-fit:cover;object-position:center;transition:filter .5s;image-rendering:pixelated}
/* PNG safe frame — landscape tamagotchi vault, inner window ~45-66% x, 34-65% y */
.safe-frame-img{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;object-fit:contain;transition:filter .4s;image-rendering:pixelated}
/* Stage tints for frame — no grayscale, keep original colors */
.stage-approved .safe-frame-img{filter:brightness(1.1) drop-shadow(0 0 12px rgba(255,200,100,.4))}
/* Stage filters for reward image — no grayscale */
.stage-approved .safe-img-layer img{filter:brightness(1.1) saturate(1.15);animation:itemShine 3s ease-in-out infinite}
@keyframes itemShine{0%,100%{filter:brightness(1.1) saturate(1.15)}50%{filter:brightness(1.2) saturate(1.25)}}
/* Stamp */
.safe-stamp{position:absolute;top:70px;right:-8px;background:linear-gradient(135deg,#FF3E7A,#E8205A);color:#fff;font-family:'Gowun Batang',Georgia,serif;font-size:20px;font-weight:700;padding:11px 24px;border-radius:4px;transform:rotate(12deg) scale(0);transition:transform .4s;box-shadow:0 4px 14px rgba(255,62,122,.35);letter-spacing:3px;border:2.5px solid rgba(255,255,255,.5);z-index:6}
.stage-approved .safe-stamp{transform:rotate(12deg) scale(1);animation:stampPop .5s ease}
@keyframes stampPop{0%{transform:rotate(12deg) scale(0)}60%{transform:rotate(12deg) scale(1.2)}80%{transform:rotate(12deg) scale(.95)}100%{transform:rotate(12deg) scale(1)}}
/* Glow */
.safe-glow{display:none;position:absolute;inset:-16px;z-index:0;border-radius:36px;pointer-events:none;
  background:radial-gradient(ellipse,rgba(255,220,130,.22) 0%,rgba(255,105,180,.12) 45%,transparent 70%);
  animation:safeGlowPulse 2.5s ease-in-out infinite}
.stage-approved .safe-glow{display:block}
@keyframes safeGlowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
/* Sparkles — approved only */
.safe-sparkles{position:absolute;inset:-6px;pointer-events:none;overflow:visible;z-index:5;display:none}
.stage-approved .safe-sparkles{display:block}
.safe-sparkle{position:absolute;opacity:0;animation:safeSparkle 3s ease-in-out infinite}
@keyframes safeSparkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.7;transform:scale(1)}}

/* ---- Status & Info ---- */
.safe-status{text-align:center;margin-top:-4px}
.safe-status-badge{display:inline-block;padding:7px 22px;border-radius:20px;font-size:14px;font-weight:900;transition:all .4s}
.stage-stored .safe-status-badge{background:rgba(200,180,190,.18);color:var(--tm)}
.stage-review .safe-status-badge{background:rgba(255,105,180,.1);color:var(--c)}
.stage-examining .safe-status-badge{background:rgba(255,105,180,.15);color:var(--cd)}
.stage-preapproved .safe-status-badge{background:linear-gradient(135deg,rgba(255,107,157,.15),rgba(255,105,180,.12));color:#FF69B4;border:1.5px solid rgba(255,107,157,.35);font-size:15px}
.stage-approved .safe-status-badge{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;box-shadow:0 4px 14px rgba(255,105,180,.3);font-size:15px}
.safe-status-sub{font-size:12px;color:var(--tm);margin-top:4px;font-weight:500}

.safe-info{width:100%}
.safe-price{font-size:14px;color:var(--dk);font-weight:700;text-align:center}
.safe-progress-label{font-size:12px;color:var(--dk);margin-top:10px;font-weight:700;letter-spacing:1px}
.safe-progress-wrap{display:flex;align-items:center;gap:6px;margin-top:5px}
.safe-progress-bar{flex:1;height:14px;background:var(--lcd);border:2px solid var(--dk);overflow:hidden;position:relative;
  background-image:repeating-linear-gradient(90deg, transparent 0, transparent 9px, var(--dk) 9px, var(--dk) 10px)}
.safe-progress-fill{height:100%;transition:width .5s;background:var(--px);
  background-image:repeating-linear-gradient(90deg, var(--px) 0, var(--px) 9px, var(--dk) 9px, var(--dk) 10px)}
.safe-progress-pct{font-size:13px;font-weight:700;color:var(--dk);min-width:40px;text-align:right;font-family:'DotGothic16',monospace}

.safe-comment{font-size:12px;color:var(--dk);margin-top:10px;padding:8px 10px;background:var(--lcd);line-height:1.5;border:2px solid var(--dk);text-align:left;font-weight:600}
.safe-days-left{font-size:11px;color:var(--dk);margin-top:8px;text-align:center;font-weight:700;letter-spacing:1px}
.safe-swaps{font-size:11px;color:var(--tm);margin-top:4px;text-align:center;font-weight:500}

.safe-cta{margin-top:10px;padding:12px !important;font-size:13px !important;width:100%}

/* Upload empty state */
.safe-upload{padding:24px 14px;text-align:center;cursor:pointer}
.safe-upload-icon{font-size:44px;margin-bottom:8px;display:inline-block}
.safe-upload-title{font-size:14px;font-weight:700;color:var(--dk);margin-bottom:8px;letter-spacing:1px}
.safe-upload-text{font-size:12px;color:var(--tm);line-height:1.6;font-weight:500}
.safe-upload-text b{color:var(--dk);display:inline-block;margin-top:8px;font-size:13px;font-weight:700;background:var(--px);color:var(--hi);padding:6px 10px;border:3px solid var(--dk);box-shadow:2px 2px 0 var(--dk)}

.ex-list{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.ex-card{background:var(--hi);padding:12px;border:3px solid var(--dk);box-shadow:3px 3px 0 var(--dk);position:relative}
.ex-card.done{opacity:.5;background:var(--lcd)}
.ex-card.done .ex-name{text-decoration:line-through;color:var(--tm)}
.ex-name{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--dk);letter-spacing:1px}
.ex-desc{font-size:11px;color:var(--tm);margin-bottom:8px;font-weight:600}
.ex-sets{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{width:36px;height:36px;border:3px solid var(--dk) !important;border-radius:0;background:var(--hi);font-size:12px;font-weight:700;color:var(--dk);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;box-shadow:2px 2px 0 var(--dk)}
.set-btn.done{background:var(--px);color:var(--hi);text-shadow:1px 1px 0 var(--dk)}
.set-btn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--dk)}

.rest-timer-bar{flex:1;height:12px;background:var(--hi);border:2px solid var(--dk);overflow:hidden;position:relative;

.rest-timer-text{font-size:11px;font-weight:700;color:var(--dk);min-width:36px;text-align:right;font-family:'DotGothic16',monospace}
.rest-timer.done-timer{background:var(--gold)}
.rest-timer.done-timer .rest-timer-fill{background:var(--dk)}

.progress-bar{height:14px;background:var(--lcd);border:2px solid var(--dk);margin:12px 0 6px;overflow:hidden;
  background-image:repeating-linear-gradient(90deg, transparent 0, transparent 9px, var(--dk) 9px, var(--dk) 10px)}
.progress-fill{height:100%;background:var(--px);transition:width .3s;
  background-image:repeating-linear-gradient(90deg, var(--px) 0, var(--px) 9px, var(--dk) 9px, var(--dk) 10px)}
.progress-text{font-size:12px;color:var(--dk);text-align:center;margin-bottom:12px;font-weight:700;letter-spacing:1px;font-family:'DotGothic16',monospace}

.walk-card{text-align:center;padding:24px 14px;margin:12px 0;background:var(--hi);border:3px solid var(--dk);box-shadow:4px 4px 0 var(--dk)}

.walk-card p{font-size:12px;color:var(--tm);line-height:1.5;margin-bottom:12px}

.done-card{text-align:center;padding:24px 14px;margin:12px 0;background:var(--hi);border:3px solid var(--dk);box-shadow:4px 4px 0 var(--dk)}
.done-card h2{font-size:18px;margin-bottom:8px;color:var(--dk);letter-spacing:2px}
.done-card p{font-size:12px;color:var(--tm);margin-bottom:14px;line-height:1.5}
.done-btns{display:flex;flex-direction:column;gap:8px}

.cal-month{text-align:center;font-size:14px;font-weight:700;margin:14px 0 10px;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--dk);letter-spacing:2px}

.crop-modal{position:fixed;inset:0;background:rgba(30,10,30,.9);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px)}

.crop-btns{display:flex;gap:14px;margin-top:18px}
.crop-btns button{padding:12px 28px;border-radius:16px;font-size:14px;font-weight:900;border:none;cursor:pointer;font-family:inherit;transition:transform .15s}
.crop-btns button:active{transform:scale(.92)}
.crop-save{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;box-shadow:0 4px 15px rgba(255,105,180,.3)}
.crop-cancel{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.2)!important}

.skip-modal{position:fixed;inset:0;background:rgba(30,10,30,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.skip-box{background:var(--hi);padding:20px;max-width:320px;width:100%;text-align:center;border:3px solid var(--dk);box-shadow:6px 6px 0 var(--dk)}
.skip-box h3{font-size:16px;margin-bottom:10px;font-weight:700;color:var(--dk);letter-spacing:1px}
.skip-box p{font-size:12px;color:var(--tm);margin-bottom:12px;line-height:1.5}
.skip-box .skip-count{font-size:28px;font-weight:700;color:var(--px);display:block;margin:10px 0;font-family:'DotGothic16',monospace}
.skip-btns{display:flex;gap:8px}
.skip-btns button{flex:1;padding:10px !important;font-size:13px !important;font-weight:700 !important;border:3px solid var(--dk) !important;border-radius:0 !important;box-shadow:3px 3px 0 var(--dk) !important;font-family:inherit;cursor:pointer}
.skip-btns button:active{transform:translate(3px,3px) !important;box-shadow:0 0 0 var(--dk) !important}

/* Complete popup */
.complete-popup{position:fixed;inset:0;background:rgba(30,10,30,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.complete-box{background:var(--hi);padding:22px;max-width:340px;width:100%;text-align:center;border:3px solid var(--dk);box-shadow:6px 6px 0 var(--dk);position:relative;

.unlock-box{background:linear-gradient(150deg,#FFF0F0,#FFF0F8,#F8EAFF)!important;border:3px solid #FF6B9D;box-shadow:0 10px 50px rgba(255,107,157,.25),0 0 80px rgba(255,105,180,.15)!important;padding:32px 24px!important}

.unlock-stamp{display:inline-block;font-size:24px;font-weight:900;color:#D42B2B;border:5px double #D42B2B;outline:3px solid rgba(212,43,43,.35);outline-offset:3px;border-radius:10px;padding:10px 22px;letter-spacing:4px;white-space:nowrap;transform:rotate(-9deg);font-family:'Gowun Batang',Georgia,serif;margin:16px 0;text-shadow:0 2px 4px rgba(212,43,43,.25);box-shadow:inset 0 0 0 2px rgba(212,43,43,.15),0 4px 20px rgba(212,43,43,.2),0 0 40px rgba(255,105,180,.18);animation:unlockStamp .4s ease-out forwards}
@keyframes unlockStamp{0%{transform:rotate(-9deg) scale(3);opacity:0}70%{transform:rotate(-9deg) scale(.95);opacity:1}100%{transform:rotate(-9deg) scale(1);opacity:1}}
.unlock-stats{display:flex;justify-content:center;gap:16px;margin:12px 0}

.unlock-stat b{color:#FF69B4;font-weight:900}
.unlock-comment{font-size:13px;font-weight:700;color:var(--tm);margin:14px 0 6px;white-space:nowrap}
@media(prefers-color-scheme:dark){.unlock-comment{background:linear-gradient(160deg,#2A1A1A,#28181A,#2A1818);color:#F0A0A8;border-color:#E0408A}
.unlock-comment::before{background:linear-gradient(160deg,#2A2418,#28201A)}}
.unlock-congrats{font-size:14px;font-weight:900;background:linear-gradient(135deg,var(--c),#FF6B9D,#FFB3C6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:6px;letter-spacing:.5px}

/* Price input in upload */
.price-row{display:flex;align-items:center;gap:8px;margin-top:12px;justify-content:center}
.price-row input{width:120px;border:2.5px solid var(--c3);border-radius:12px;padding:8px 10px;font-size:14px;text-align:center;background:var(--bg);color:var(--tx);font-family:inherit}
.price-row input:focus{border-color:var(--c);outline:none;box-shadow:0 0 0 3px rgba(255,105,180,.15)}
.price-row span{font-size:13px;color:var(--th);font-weight:700}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--hi);color:var(--dk);padding:10px 18px;font-size:12px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;border:3px solid var(--dk);box-shadow:3px 3px 0 var(--dk);letter-spacing:1px;font-family:'Galmuri11','DotGothic16',monospace}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}
.confetti-piece{position:absolute;border-radius:3px;animation:confettiFall 2.5s ease-in forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg) scale(1)}50%{opacity:1}100%{opacity:0;transform:translateY(100vh) rotate(1080deg) scale(.5)}}
.confetti-piece.from-bottom{top:auto;bottom:0;animation:confettiRise 2.5s ease-in forwards}
@keyframes confettiRise{0%{opacity:1;transform:translateY(20px) rotate(0deg) scale(1)}50%{opacity:1}100%{opacity:0;transform:translateY(-100vh) rotate(-1080deg) scale(.5)}}

.hidden{display:none!important}

.sparkles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.sparkle{position:absolute;font-size:12px;opacity:0;animation:sparkleFloat linear infinite}
@keyframes sparkleFloat{
0%{opacity:0;transform:translateY(100vh) rotate(0deg)}
10%{opacity:.6}
90%{opacity:.6}
100%{opacity:0;transform:translateY(-20px) rotate(360deg)}
}

<body>
<div class="device-header">♡ PRINCESS POCKET ♡</div>
<div class="lcd-wrap"><div class="lcd-screen"><div id="app"></div></div></div>
<div id="modal"></div>
<div class="toast" id="toast"></div>
<div class="tabs"><div class="tabs-inner">
<button class="tab active" onclick="switchTab(0)"><span class="tab-icon">👸</span>수련</button>
<button class="tab" onclick="switchTab(1)"><span class="tab-icon">📅</span>출석부</button>
<button class="tab" onclick="switchTab(2)"><span class="tab-icon">💎</span>보관함</button>
<button class="tab" onclick="switchTab(3)"><span class="tab-icon">⚙️</span>설정</button>
</div></div>
<script>
// --- Pixel Princess character ---
// Uses princess.png sprite with CSS-animated prop overlays per tab.
function pixelPrincess(prop){
  var gold='#F4D06F', dg='#B8860B', ruby='#E02E2E',
      dkOut='#3A1425', dressW='#FFFFFF';
  function R(x,y,w,h,c){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+c+'"/>';}
  var cls='princess'+(prop==='squat'?' princess-squat':'');
  var propHtml='';
  if(prop==='lift'){
    // Two-frame strength-workout animation (1s per frame)
    return '<div class="princess-wrap">'
      +'<div class="princess-lift-stack">'
      +'<img class="lift-frame f1" src="princess-lift1.png" alt="공주" draggable="false"/>'
      +'<img class="lift-frame f2" src="princess-lift2.png" alt="공주" draggable="false"/>'
      +'</div>'
      +'</div>';
  }
  if(prop==='run'){
    // Two-frame cardio running animation (0.25s per frame)
    return '<div class="princess-wrap">'
      +'<div class="princess-run-stack">'
      +'<img class="run-frame f1" src="princess-run1.png" alt="공주" draggable="false"/>'
      +'<img class="run-frame f2" src="princess-run2.png" alt="공주" draggable="false"/>'
      +'</div>'
      +'</div>';
  }
  if(prop==='squat'){
    // Pixel dumbbell SVG
    var s='<svg class="princess-prop prop-dumbbell" viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">';
    s+=R(1,5,3,6,dg);          // left weight outline
    s+=R(12,5,3,6,dg);         // right weight outline
    s+=R(2,6,1,4,gold);        // left weight highlight
    s+=R(13,6,1,4,gold);       // right weight highlight
    s+=R(4,7,8,2,dkOut);       // bar outline
    s+=R(4,7,8,1,gold);        // bar top
    s+='</svg>';
    propHtml=s;
  } else if(prop==='book'){
    var s='<svg class="princess-prop prop-book" viewBox="0 0 16 16" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">';
    s+=R(2,3,12,10,'#8B4A7A'); // book cover
    s+=R(2,3,12,1,gold);        // top trim
    s+=R(2,12,12,1,gold);       // bottom trim
    s+=R(3,4,10,8,dressW);      // pages
    s+=R(4,5,8,1,'#F4A7C2');    // page line
    s+=R(4,7,8,1,'#F4A7C2');    // page line
    s+=R(4,9,5,1,'#F4A7C2');    // page line
    s+=R(7,8,2,1,ruby);         // heart mark
    s+='</svg>';
    propHtml=s;
  } else if(prop==='mirror'){
    var s='<svg class="princess-prop prop-mirror" viewBox="0 0 16 20" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">';
    s+=R(2,1,12,12,gold);        // frame outer
    s+=R(3,2,10,10,'#C8E0F0');   // mirror glass
    s+=R(4,3,3,3,dressW);        // highlight
    s+=R(2,1,12,1,'#FFF4C4');    // top shine
    s+=R(13,2,1,11,dg);          // side shadow
    s+=R(7,13,2,5,dg);           // handle
    s+=R(6,17,4,2,gold);         // handle knob
    s+='</svg>';
    propHtml=s;
  } else if(prop==='wand'){
    var s='<svg class="princess-prop prop-wand" viewBox="0 0 14 20" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">';
    // Star tip
    s+=R(6,0,2,2,gold);
    s+=R(4,2,6,2,gold);
    s+=R(2,4,10,2,gold);
    s+=R(4,6,6,2,gold);
    s+=R(3,5,1,1,gold);
    s+=R(10,5,1,1,gold);
    s+=R(5,8,1,2,gold);
    s+=R(8,8,1,2,gold);
    // Ruby center
    s+=R(6,3,2,2,ruby);
    // Handle
    s+=R(6,6,2,14,dg);
    s+=R(6,6,1,14,'#8B6914');
    s+='</svg>';
    propHtml=s+'<span class="sparkle s1">✦</span><span class="sparkle s2">✧</span><span class="sparkle s3">✦</span>';
  }
  return '<div class="princess-wrap">'
    +'<img class="'+cls+'" src="princess.png" alt="공주" draggable="false"/>'
    +propHtml
    +'</div>';
}

function renderStatusBar(){
  var streak=getStreak();
  var lvl=Math.floor((S.history||[]).length/5);
  var count=getMonthCount();
  var hearts='';
  for(var i=0;i<5;i++){
    hearts+='<span class="heart'+(i>=streak?' empty':'')+'">♥</span>';
  }
  return '<div class="status-bar">'
    +'<div class="stat">'+hearts+'</div>'
    +'<div class="stat">👑 LV.'+lvl+'</div>'
    +'<div class="stat">📊 '+count+'/'+GOAL+'</div>'
    +'</div>';
}
function renderPrincessStage(tab){
  var prop;
  if(tab===0){
    // On strength days → dumbbell curl, cardio days → running
    try{
      var r=curRoutine();
      if(r&&r.type==='strength')prop='lift';
      else if(r&&r.type==='cardio')prop='run';
      else prop='squat';
    }catch(e){prop='squat';}
  }
  else if(tab===1)prop='book';
  else if(tab===2)prop='mirror';
  else prop='wand';
  var labels=['♥ 오늘도 수련해요 ♥','♥ 왕실 출석부 ♥','♥ 보물 보관함 ♥','♥ 왕실 설정 ♥'];
  return '<div class="princess-stage">'
    +pixelPrincess(prop)
    +'<div class="princess-label">'+labels[tab]+'</div>'
    +'</div>';
}

'충동구매보다는 계획된 소비에 가까워지고 있어요.',

'오늘 운동은 꽤 모범적으로 기록되었어요.'

function seededRand(seed){return function(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646}}
function pickRandom(arr,n,rng){
  var a=arr.slice();var res=[];
  for(var i=0;i<n&&a.length;i++){var idx=Math.floor(rng()*a.length);res.push(a.splice(idx,1)[0])}
  return res;
}
function _prevStrengthNames(idx){
  // look back at most 2 steps for previous strength routine
  for(var back=2;back<=4;back+=2){
    var pi=idx-back;
    if(pi<0)return [];
    if(CYCLE_PATTERN[((pi%5)+5)%5]==='strength'){
      var pseed=pi*7919+31;
      var prng=seededRand(pseed);
      var pbase=[
        pickRandom(POOL.compound,1,prng)[0],
        pickRandom(POOL.hinge,1,prng)[0],
        pickRandom(prng()<0.5?POOL.pull:POOL.push,1,prng)[0],
        pickRandom(POOL.core,1,prng)[0]
      ];
      return pbase.map(function(ex,i){
        var key=pi+'_'+i;
        if(S.swapped&&S.swapped[key])return S.swapped[key].name;
        return ex.name;
      });
    }
  }
  return [];
}
function generateRoutine(idx){
  var seed=idx*7919+31;
  var rng=seededRand(seed);
  var labels=['A','C','B'];
  var icons=['👸','🌸','💎'];
  var li=idx%3;
  var prevNames=_prevStrengthNames(idx);
  function exclude(pool){
    var f=pool.filter(function(e){return prevNames.indexOf(e.name)===-1});
    return f.length?f:pool;
  }
  var compound=pickRandom(exclude(POOL.compound),1,rng)[0];
  var hinge=pickRandom(exclude(POOL.hinge),1,rng)[0];
  var isPull=rng()<0.5;
  var pp=pickRandom(exclude(isPull?POOL.pull:POOL.push),1,rng)[0];
  var core=pickRandom(exclude(POOL.core),1,rng)[0];
  var base=[compound,hinge,pp,core];
  var cfg=S.config||{sets:3,reps:10,coreSets:2,coreReps:10};
  var exercises=base.map(function(ex,i){
    var key=idx+'_'+i;
    var chosen=(S.swapped&&S.swapped[key])?S.swapped[key]:ex;
    var out={};for(var k in chosen)out[k]=chosen[k];
    if(i===3){
      out.sets=cfg.coreSets;
      if(typeof out.reps!=='string')out.reps=cfg.coreReps;
    } else {
      out.sets=cfg.sets;
      if(typeof out.reps!=='string')out.reps=cfg.reps;
    }
    return out;
  });
  return {
    type:'strength',
    name:'왕실 근력 수련 '+labels[li],
    icon:icons[li],
    short:'근력'+labels[li],
    exercises:exercises
  };
}

function getStreak(){

  var days={};
  S.history.forEach(function(h){
    var k=h.year+'-'+h.month+'-'+h.day;
    days[k]=true;
  });
  var d=new Date();

  if(!days[tk]){
    d.setDate(d.getDate()-1);
  }
  var streak=0;
  for(var i=0;i<365;i++){
    var k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    if(days[k]){streak++;d.setDate(d.getDate()-1);}

  }

var SAFE_STAGES=[
  {key:'stored',label:'보관 중',sub:'',max:19},
  {key:'review',label:'심사 중',sub:'',max:44},
  {key:'examining',label:'검토 중',sub:'',max:74},
  {key:'preapproved',label:'승인 직전',sub:'',max:99},
  {key:'approved',label:'사도 됨',sub:'',max:100}
];
var SAFE_COMMENTS_LOCKED=[
  '아직 왕실 허가가 나지 않았어요.',
  '심사 자료를 수집하고 있어요.',
  '왕실도 슬슬 납득 중이에요.',
  '이제 정말 거의 다 왔어요.',
  '공주님의 꾸준함에 감동 중...'
];
var SAFE_COMMENTS_APPROVED=[
  '"이제 사도 아무도 뭐라 안 함" 인증서 발급',
  '공주님의 꾸준함이 이 소비를 정당화했습니다.',
  '봉인 해제 완료! 데려오세요.',
  '이 아이템은 이제 공주님의 것입니다.',
  '오늘부터 이건 사치가 아니라 보상입니다.',
  '왕실도 인정한 정당한 소비예요.',
  '공주님의 성실함이 결국 왕실을 설득했어요.',
  '이 정도면 누구나 고개를 끄덕일 만한 보상이에요.'
];
function getSafeStage(pct){
  for(var i=0;i<SAFE_STAGES.length;i++){if(pct<=SAFE_STAGES[i].max)return SAFE_STAGES[i]}
  return SAFE_STAGES[4];
}
function getSafeComment(pct,count){
  if(pct>=100){
    var idx=((count*3571+7)%SAFE_COMMENTS_APPROVED.length+SAFE_COMMENTS_APPROVED.length)%SAFE_COMMENTS_APPROVED.length;
    return SAFE_COMMENTS_APPROVED[idx];
  }
  // map count to comment pool
  var ci=Math.min(Math.floor(count/4), SAFE_COMMENTS_LOCKED.length-1);
  return SAFE_COMMENTS_LOCKED[ci];
}

function renderCalendar(){
  var h=renderStatusBar();
  h+=renderPrincessStage(1);
  h+='<div class="cal-month">';
  h+='<button class="cal-nav" onclick="calPrev()">‹</button>';
  h+='<span>'+(calYear)+'년 '+(calMonth+1)+'월</span>';
  h+='<button class="cal-nav" onclick="calNext()">›</button>';
  h+='</div>';
  var days=['일','월','화','수','목','금','토'];
  h+='<div class="cal-grid">';
  days.forEach(function(d){h+='<div class="cal-day-header">'+d+'</div>'});
  var first=new Date(calYear,calMonth,1).getDay();
  var last=new Date(calYear,calMonth+1,0).getDate();
  var today=new Date();
  var records={};
  S.history.forEach(function(item){
    if(item.year===calYear&&item.month===calMonth){
      if(!records[item.day])records[item.day]=[];
      records[item.day].push(item);
    }
  });
  for(var i=0;i<first;i++)h+='<div class="cal-day"></div>';
  for(var d=1;d<=last;d++){
    var isToday=calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate();
    var has=records[d];
    var sel=calSelected===d;
    var cls='cal-day'+(isToday?' today':'')+(has?' has-record':'')+(sel?' selected':'');
    h+='<div class="'+cls+'" onclick="selectDay('+d+')">'+d+'</div>';
  }
  h+='</div>';
  if(calSelected&&records[calSelected]){
    h+='<div class="cal-detail">';
    h+='<div class="cal-detail-title">'+(calMonth+1)+'/'+calSelected+' 수련 기록</div>';
    records[calSelected].forEach(function(item){
      h+='<div class="cal-detail-item">'+item.icon+' '+item.name+'</div>';
    });
    h+='</div>';
  } else if(calSelected){
    h+='<div class="cal-detail"><div class="cal-detail-item" style="color:var(--th)">기록 없음</div></div>';
  }
  var mc=0;S.history.forEach(function(item){if(item.year===calYear&&item.month===calMonth)mc++});
  h+='<div style="text-align:center;margin:16px 0;font-size:13px;color:var(--tm)">이번 달 총 <b style="color:var(--c)">'+mc+'회</b> 수련</div>';
  document.getElementById('app').innerHTML=h;
}
function selectDay(d){calSelected=calSelected===d?null:d;renderCalendar()}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--}calSelected=null;renderCalendar()}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++}calSelected=null;renderCalendar()}

function drawChart(){
  var canvas=document.getElementById('wtCanvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr;
  canvas.height=200*dpr;
  ctx.scale(dpr,dpr);
  ctx.imageSmoothingEnabled=false;
  var W=canvas.offsetWidth,H=200;
  var data=S.weights.slice(-20);
  var vals=data.map(function(w){return w.kg});
  var minV=Math.min.apply(null,vals);
  var maxV=Math.max.apply(null,vals);
  var min=Math.floor(minV)-1;
  var max=Math.ceil(maxV)+1;
  var range=max-min||1;
  var padL=40,padR=10,padT=15,padB=25;
  var gw=W-padL-padR,gh=H-padT-padB;
  // Grid lines (pixel dashed)
  ctx.strokeStyle='rgba(90,31,58,0.15)';ctx.lineWidth=1;
  for(var v=min;v<=max;v++){
    var y=Math.round(padT+(max-v)/range*gh)+.5;
    ctx.beginPath();ctx.setLineDash([2,2]);ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillStyle='#5A1F3A';ctx.font='bold 10px "DotGothic16", monospace';ctx.textAlign='right';
    ctx.fillText(v,padL-4,y+3);
  }
  ctx.setLineDash([]);
  // Step/staircase line
  ctx.strokeStyle='#D97BA5';ctx.lineWidth=3;ctx.lineJoin='miter';ctx.lineCap='butt';
  ctx.beginPath();
  data.forEach(function(w,i){
    var x=Math.round(padL+i/(data.length-1)*gw);
    var y=Math.round(padT+(max-w.kg)/range*gh);
    if(i===0){ctx.moveTo(x,y);}
    else {
      var prevY=Math.round(padT+(max-data[i-1].kg)/range*gh);
      ctx.lineTo(x,prevY);
      ctx.lineTo(x,y);
    }
  });
  ctx.stroke();
  // Square data points (4x4 dark)
  data.forEach(function(w,i){
    var x=Math.round(padL+i/(data.length-1)*gw);
    var y=Math.round(padT+(max-w.kg)/range*gh);
    ctx.fillStyle='#5A1F3A';
    ctx.fillRect(x-2,y-2,4,4);
  });
  ctx.fillStyle='#5A1F3A';ctx.font='bold 9px "DotGothic16", monospace';ctx.textAlign='center';
  [0,Math.floor(data.length/2),data.length-1].forEach(function(i){
    if(!data[i])return;
    var x=padL+i/(data.length-1)*gw;
    ctx.fillText(data[i].date.split('.').slice(1).join('/'),x,H-5);
  });
}

var restTimer=null;
var restEi=-1,restSi=-1;
var restStart=0;
var REST_SEC=60;
var audioCtx=null;
function playAlarm(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();var ctx=audioCtx;if(ctx.state==='suspended')ctx.resume();
// 샤라랑 — 반짝이는 아르페지오 + 벨
var notes=[1568,2093,2637,3136,2637,3136,2093,2637];
notes.forEach(function(f,i){var t=i*0.08;var o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(0.15,ctx.currentTime+t+0.01);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.4);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.42);
var o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='sine';o2.frequency.value=f*2;o2.connect(g2);g2.connect(ctx.destination);g2.gain.setValueAtTime(0,ctx.currentTime+t);g2.gain.linearRampToValueAtTime(0.05,ctx.currentTime+t+0.01);g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.3);o2.start(ctx.currentTime+t);o2.stop(ctx.currentTime+t+0.32);});
}catch(e){}if(navigator.vibrate)navigator.vibrate([80,60,80,60,80,60,80]);}
function startRest(ei,si){
  clearInterval(restTimer);
  restEi=ei;restSi=si;
  restStart=Date.now();
  requestWake();
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  restTimer=setInterval(function(){
    var elapsed=Math.floor((Date.now()-restStart)/1000);
    if(elapsed>=REST_SEC){
      clearInterval(restTimer);
      updateRestUI(REST_SEC);
      restTimer=null;
      playAlarm();
    } else {
      updateRestUI(elapsed);
    }
  },200);
}
function restoreRestUI(){
  if(!restTimer||restEi<0)return;
  var elapsed=Math.floor((Date.now()-restStart)/1000);
  if(elapsed<REST_SEC)updateRestUI(elapsed);
  else updateRestUI(REST_SEC);
}
function updateRestUI(sec){
  var el=document.getElementById('rest-'+restEi+'-'+restSi);
  if(!el)return;
  var pct=Math.min(100,Math.round(sec/REST_SEC*100));
  var left=REST_SEC-sec;
  var bar=el.querySelector('.rest-timer-fill');
  var txt=el.querySelector('.rest-timer-text');
  if(bar)bar.style.width=pct+'%';
  if(txt)txt.textContent=left>0?left+'초':'GO!';
  if(left<=0)el.classList.add('done-timer');
}

  h+='<button class="crop-save" onclick="saveCrop()">완료 ✨</button>';
  h+='</div></div>';
  document.getElementById('modal').innerHTML=h;
  var img=document.getElementById('cropImg');
  img.onload=function(){
    var area=document.getElementById('cropArea');
    var aw=area.offsetWidth,ah=area.offsetHeight;
    var iw=img.naturalWidth,ih=img.naturalHeight;
    var scale;
    if(iw/ih>1){scale=ah/ih;} else {scale=aw/iw;}
    img.style.width=(iw*scale)+'px';
    img.style.height=(ih*scale)+'px';
    img.style.left=((aw-iw*scale)/2)+'px';
    img.style.top=((ah-ih*scale)/2)+'px';
    var sx,sy,sl,st;
    function onStart(e){
      e.preventDefault();
      var p=e.touches?e.touches[0]:e;
      sx=p.clientX;sy=p.clientY;
      sl=parseFloat(img.style.left)||0;
      st=parseFloat(img.style.top)||0;
    }
    function onMove(e){
      if(sx===undefined)return;
      e.preventDefault();
      var p=e.touches?e.touches[0]:e;
      var dx=p.clientX-sx,dy=p.clientY-sy;
      img.style.left=(sl+dx)+'px';
      img.style.top=(st+dy)+'px';
    }
    function onEnd(){sx=undefined}
    area.addEventListener('touchstart',onStart,{passive:false});
    area.addEventListener('touchmove',onMove,{passive:false});
    area.addEventListener('touchend',onEnd);
    area.addEventListener('mousedown',onStart);
    area.addEventListener('mousemove',onMove);
    area.addEventListener('mouseup',onEnd);
  };
}
function saveCrop(){
  var area=document.getElementById('cropArea');
  var img=document.getElementById('cropImg');
  var canvas=document.createElement('canvas');
  canvas.width=240;canvas.height=240;
  var ctx=canvas.getContext('2d');
  var l=parseFloat(img.style.left)||0;
  var t=parseFloat(img.style.top)||0;
  var dw=parseFloat(img.style.width);
  var dh=parseFloat(img.style.height);
  var sx=-l/dw*img.naturalWidth;
  var sy=-t/dh*img.naturalHeight;
  var sw=240/dw*img.naturalWidth;
  var sh=240/dh*img.naturalHeight;
  ctx.drawImage(img,sx,sy,sw,sh,0,0,240,240);
  S.reward.img=canvas.toDataURL('image/jpeg',0.85);
  S.reward.month=curMonthKey();
  save();closeModal();render();toast('왕실 심사 접수 완료! 👑');
}

function showConfetti(fromBottom){
  var c=document.createElement('div');c.className='confetti';
  var colors=['#FF6B9D','#FFB3C6','#fbbf24','#a78bfa','#34d399','#60a5fa','#FF8FB1'];
  for(var i=0;i<50;i++){
    var p=document.createElement('div');p.className='confetti-piece'+(fromBottom?' from-bottom':'');
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*1.2+'s';
    p.style.width=(6+Math.random()*8)+'px';
    p.style.height=(6+Math.random()*8)+'px';
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(function(){c.remove()},3500);
}
